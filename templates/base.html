<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facial Recognition Smart Attendance</title>
    <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/gh/tabler/tabler-icons/icons/face-id.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <div class="logo-circle">
                <i class="fa-solid fa-user-check"></i>
            </div>
            <div class="logo-text">
                <h1>Smart Attendance</h1>
                <p>Facial Recognition &mdash; Real-time, Reliable, Responsive</p>
            </div>
        </div>
        <nav class="header-nav">
            <a href="{{ url_for('home') }}" class="nav-link">Home</a>
          
        </nav>
    </header>

    <main class="app-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <span>Facial Recognition&ndash;Based Smart Attendance System</span>
        <span class="footer-dot">&bull;</span>
        <span>Fully Automated | FaceID Powered</span>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
